<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <link href="auth.css" rel="stylesheet" /> 
</head>
<body>
  <h3><div class="brand">GLASS PARTNERSHIP GROUP</div></h3>
  <h1><div class="desc">Профессиональные стеклянные решения</div></h1>
  <div class="card">
  <form>
    <h2 class="card_title">Регистрация</h2>
    <p class="card__subtitle">Создайте аккаунт</p>
    <label class="visually_hidden" for="email" >Email: </label>
    <input class="card_input" type="email" id="email" name="email" placeholder="Введите Email..." required />
    <label for="password" class="visually_hidden">Password: </label>
    <input class="card_input" type="password" id="password" name="password" placeholder="Введите Пароль..." required />
    <div class="button_and_txt">
    <button class="button" type="submit">Зарегистрироваться</button>
    </div>
  </form>
  <div class="under_text">
    <p>✓ Добавление товаров в корзину.</p>
    <p>✓ Оформление заказа</p>
    <p>✓ История заказов</p>
  </div>
  <p class="registrated">Уже зарегистрированы? <a href="login.html">Войти</a></p>
  </div>
  </div>
</body>
</html>
